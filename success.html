<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! | RJ's Community Ventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #1A1D20;
            --text-muted: #4A525A;
            --accent: #00B4D8; 
            --accent-gradient: linear-gradient(135deg, #00B4D8, #0077B6);
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-body);
            color: var(--text-primary);
            background-image: url('871.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 20px;
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
        }

        .success-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.05);
        }

        .waving-panda {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            animation: pandaWave 3s ease-in-out infinite;
            transform-origin: bottom center;
            background-color: #fff;
            border: 3px solid var(--accent);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            color: #0077B6;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 16px 38px;
            font-weight: 700;
            font-size: 1.25rem;
            border-radius: 50px;
            text-decoration: none;
            background: var(--accent-gradient);
            color: #FFFFFF;
            box-shadow: 0 8px 24px rgba(0, 180, 216, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #0077B6;
            transform: translateY(-2px);
        }

        @keyframes pandaWave {
            0%, 100% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-8deg) scale(1.03); }
            40% { transform: rotate(6deg) scale(1.03); }
            60% { transform: rotate(-4deg) scale(1.03); }
            80% { transform: rotate(2deg) scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="success-overlay"></div>

    <div class="success-card">
        <img src="rj-logo.png" alt="Waving Panda Mascot" class="waving-panda">
        <h1>Awesome, You're Booked!</h1>
        <p>Thanks for reaching out! Samantha will look over your details and get in touch with you shortly to confirm everything.</p>
        <a href="index.html" class="btn">Back to Website</a>
    </div>

</body>
</html>
